[mcp_servers.aws]
args = ["awslabs.aws-api-mcp-server@latest"]
autoApprove = []
command = "uvx"
disabled = false

[mcp_servers.aws.env]
AWS_API_MCP_PROFILE_NAME = "example-dev"
AWS_REGION = "ca-central-1"

[mcp_servers.azure]
args = ["-y", "@azure/mcp@latest", "server", "start"]
command = "npx"
gallery = true
type = "stdio"

[mcp_servers.azure.tools.documentation]
approval_mode = "approve"

[mcp_servers.azure.tools.monitor]
approval_mode = "approve"

[mcp_servers.azure-devops]
args = ["-y", "@azure-devops/mcp@latest", "example-organization"]
command = "npx"
disabled = false

[mcp_servers.azure-devops.tools.core_list_projects]
approval_mode = "approve"

[mcp_servers.azure-devops.tools.wit_my_work_items]
approval_mode = "approve"

[mcp_servers.context7]
type = "streamable-http"
url = "https://mcp.example.com/mcp"

[mcp_servers.github]
type = "streamable-http"
url = "https://api.example.com/mcp/"
bearer_token_env_var = CODEX_GITHUB_PERSONAL_ACCESS_TOKEN

[mcp_servers.github.tools.get_file_contents]
approval_mode = "approve"

[mcp_servers.github.tools.list_commits]
approval_mode = "approve"

[mcp_servers.github.tools.push_files]
approval_mode = "approve"

[mcp_servers.github.tools.search_repositories]
approval_mode = "approve"

[mcp_servers.grafana]
args = []
command = "mcp-grafana"

[mcp_servers.grafana.env]
GRAFANA_SERVICE_ACCOUNT_TOKEN = "REPLACE_WITH_GRAFANA_TOKEN"
GRAFANA_URL = "https://grafana.example.com"

[mcp_servers.grafana.tools.list_datasources]
approval_mode = "approve"

[mcp_servers.grafana.tools.list_prometheus_metric_names]
approval_mode = "approve"

[mcp_servers.grafana.tools.query_loki_logs]
approval_mode = "approve"

[mcp_servers.grafana.tools.query_loki_stats]
approval_mode = "approve"

[mcp_servers.grafana.tools.query_prometheus]
approval_mode = "approve"

[mcp_servers.kubernetes]
args = ["-y", "kubernetes-mcp-server@latest"]
command = "npx"

[mcp_servers.kubernetes.tools.resources_list]
approval_mode = "approve"

[mcp_servers.qdrant]
args = ["mcp-server-qdrant"]
command = "uvx"
disabled = false

[mcp_servers.qdrant.env]
COLLECTION_NAME = "agent-notes"
EMBEDDING_MODEL = "sentence-transformers/all-MiniLM-L6-v2"
QDRANT_API_KEY = "1234567890"
QDRANT_URL = "https://example-qdrant.aws.cloud.qdrant.io:6333"

[mcp_servers.qdrant.tools.qdrant-find]
approval_mode = "approve"

[mcp_servers.terraform]
args = ["run", "-i", "--rm", "-e", "TFE_TOKEN=REPLACE_WITH_TFE_TOKEN", "hashicorp/terraform-mcp-server:latest"]
command = "docker"

[mcp_servers.terraform.tools.create_run]
approval_mode = "approve"

[mcp_servers.terraform.tools.get_run_details]
approval_mode = "approve"

[mcp_servers.terraform.tools.get_workspace_details]
approval_mode = "approve"

[mcp_servers.terraform.tools.list_runs]
approval_mode = "approve"

[mcp_servers.terraform.tools.list_terraform_projects]
approval_mode = "approve"

[mcp_servers.terraform.tools.list_workspace_variables]
approval_mode = "approve"

[mcp_servers.terraform.tools.list_workspaces]
approval_mode = "approve"
